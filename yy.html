<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snooker Scoreboard</title>
    <link rel="shortcut icon" href="8_ball.png">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a2e;
            color: white;
            padding: 10px;
            margin: 0;
            min-height: 100vh;
        }

        #grid-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 25px;
            padding: 10px;
            box-sizing: border-box;
        }

        .box {
            padding: 30px 15px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            min-height: 160px;
            justify-content: center;
            transition: transform 0.2s;
        }

        .add-box {
            background: rgba(255, 255, 255, 0.05);
            border: 3px dashed rgba(255, 255, 255, 0.2);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.4);
            min-height: 100px;
        }

        .add-box:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffd700;
            color: #ffd700;
        }

        .remove-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Player Colors */
        .color-0 {
            background: #1e3799;
            color: white;
        }

        .color-1 {
            background: #82ccdd;
            color: #0a3d62;
        }

        .color-2 {
            background: #4b134f;
            color: white;
        }

        .color-3 {
            background: #f8a5c2;
            color: #4b134f;
        }

        .color-4 {
            background: #079992;
            color: white;
        }

        .color-5 {
            background: #b8e994;
            color: #079992;
        }

        .color-6 {
            background: #e58e26;
            color: white;
        }

        .color-7 {
            background: #feca57;
            color: #e58e26;
        }

        .color-8 {
            background: #b71540;
            color: white;
        }

        .color-9 {
            background: #ffcccc;
            color: #b71540;
        }

        .counter {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .btn {
            font-size: 30px;
            width: 55px;
            height: 55px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            color: inherit;
            font-weight: bold;
        }

        .number {
            font-size: 60px;
            font-weight: 900;
            min-width: 120px;
            text-align: center;
            margin: 0 10px;
        }

        .player-input {
            width: 80%;
            background: transparent;
            border: none;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: inherit;
            outline: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding: 5px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            width: 100%;
            justify-content: center;
        }

        .action-btn {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: 0.2s;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .complete-btn {
            background: #f1c40f;
            color: black;
        }

        .reset-btn {
            background: #e74c3c;
        }

        /* Top Action Buttons */
        .top-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .rules-btn {
            background: transparent;
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }

        .rules-btn:hover {
            background: #ffd700;
            color: #1a1a2e;
        }

        .record-btn {
            border-color: #3498db;
            color: #3498db;
        }

        .record-btn:hover {
            background: #3498db;
            color: #fff;
        }

        /* Overlays (Winner, Rules, Images, Records) */
        .overlay-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 46, 0.98);
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 2000;
            padding: 20px 10px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        #image-overlay {
            z-index: 3000;
            justify-content: center;
        }

        #position-img {
            max-width: 95%;
            max-height: 80vh;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .close-cross {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .winner-card {
            background: #ffd700;
            color: #000;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            margin-top: 20px;
        }

        .score-list {
            width: 95%;
            max-width: 500px;
            margin-top: 20px;
        }

        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
        }

        /* Snooker Balls CSS */
        .rules-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ball-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        .ball-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 55px;
        }

        .ball {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            box-shadow: inset -8px -8px 15px rgba(0, 0, 0, 0.6), 2px 4px 6px rgba(0, 0, 0, 0.5);
            margin-bottom: 4px;
        }

        .ball-name {
            font-size: 11px;
            font-weight: 600;
            color: #a4b0be;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .ball-score {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }

        .b-red {
            background: red;
        }

        .b-yellow {
            background: #edd471;
        }

        .b-green {
            background: green;
        }

        .b-brown {
            background: brown;
        }

        .b-blue {
            background: blue;
        }

        .b-pink {
            background: #ff9ff3;
        }

        .b-black {
            background: #111;
            border: 1px solid #333;
        }

        /* Saved Records Styles */
        .history-card {
            background: rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 500px;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-sizing: border-box;
            text-align: left;
            position: relative;
        }

        .hist-date {
            font-size: 14px;
            color: #a4b0be;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 5px;
            padding-right: 25px;
        }

        .hist-status {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
            text-transform: capitalize;
        }

        .hist-player {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            margin-bottom: 5px;
        }

        /* Individual Delete Button */
        .delete-single-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: transparent;
            border: none;
            color: #ff4757;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            padding: 5px;
            transition: 0.2s;
        }

        .delete-single-btn:hover {
            color: #ff6b81;
            transform: scale(1.1);
        }

        /* Footer Styles */
        .footer {
            margin-top: auto;
            padding: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            width: 100%;
        }

        .footer a {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .footer a:hover {
            text-decoration: underline;
            color: #fff;
        }
    </style>
</head>

<body>

    <h2 style="margin: 20px 0 10px 0; color: #ffd700; letter-spacing: 2px; text-transform: uppercase;">Snooker
        Scoreboard</h2>

    <div class="top-btns">
        <button class="rules-btn" onclick="showRules()">Color Rules 📋</button>
        <button class="rules-btn record-btn" onclick="showRecords()">Show Record 📊</button>
    </div>

    <div id="grid-container"></div>

    <div class="controls">
        <button class="action-btn complete-btn" onclick="showWinner()">🏆 SHOW WINNER</button>
        <button class="action-btn reset-btn" onclick="resetAll()">RESET</button>
    </div>

    <div class="footer">
        Developed and design by <a href="https://www.hamaadsblog.in/About" target="_blank">Hamaad Afraan</a>
    </div>

    <div id="winner-overlay" class="overlay-screen">
        <h2 id="match-status" style="color: #ffd700;">FINAL STANDINGS</h2>
        <div id="winner-info" class="winner-card"></div>
        <div id="all-scores" class="score-list"></div>

        <div style="display: flex; gap: 15px; margin: 30px 0; width: 90%; max-width: 450px; justify-content: center;">
            <button class="action-btn" id="save-btn" style="background:#2ecc71; color:white; flex: 1;"
                onclick="saveMatchData()">💾 SAVE</button>
            <button class="action-btn" style="background:white; color:black; flex: 1;"
                onclick="closeWinner()">CLOSE</button>
        </div>
    </div>

    <div id="rules-overlay" class="overlay-screen">
        <button class="close-cross" onclick="closeRules()">✕</button>
        <h1 style="color: #ffd700; margin-bottom: 20px; text-transform: uppercase;">Color Rules</h1>

        <div class="rules-section">
            <h2
                style="margin: 0; color: #fff; border-bottom: 1px dashed rgba(255,255,255,0.3); padding-bottom: 10px; width: 100%;">
                SNOOKER</h2>
            <div class="ball-container">
                <div class="ball-item">
                    <div class="ball b-red"></div><span class="ball-name">Red</span><span class="ball-score">1</span>
                </div>
                <div class="ball-item">
                    <div class="ball b-yellow"></div><span class="ball-name">Yellow</span><span
                        class="ball-score">2</span>
                </div>
                <div class="ball-item">
                    <div class="ball b-green"></div><span class="ball-name">Green</span><span
                        class="ball-score">3</span>
                </div>
                <div class="ball-item">
                    <div class="ball b-brown"></div><span class="ball-name">Brown</span><span
                        class="ball-score">4</span>
                </div>
                <div class="ball-item">
                    <div class="ball b-blue"></div><span class="ball-name">Blue</span><span class="ball-score">5</span>
                </div>
                <div class="ball-item">
                    <div class="ball b-pink"></div><span class="ball-name">Pink</span><span class="ball-score">6</span>
                </div>
                <div class="ball-item">
                    <div class="ball b-black"></div><span class="ball-name">Black</span><span
                        class="ball-score">7</span>
                </div>
            </div>
            <button class="rules-btn" style="border-color: #fff; color: #fff;"
                onclick="showPositionImage('snooker_position.jpg')">Show Position 🎱</button>
        </div>

        <div class="rules-section">
            <h2
                style="margin: 0; color: #fff; border-bottom: 1px dashed rgba(255,255,255,0.3); padding-bottom: 10px; width: 100%;">
                CENTURY</h2>
            <div class="ball-container">
                <div class="ball-item">
                    <div class="ball b-red"></div><span class="ball-name">Red</span><span class="ball-score">10</span>
                </div>
                <div class="ball-item">
                    <div class="ball b-yellow"></div><span class="ball-name">Yellow</span><span
                        class="ball-score">2</span>
                </div>
                <div class="ball-item">
                    <div class="ball b-green"></div><span class="ball-name">Green</span><span
                        class="ball-score">3</span>
                </div>
                <div class="ball-item">
                    <div class="ball b-brown"></div><span class="ball-name">Brown</span><span
                        class="ball-score">4</span>
                </div>
                <div class="ball-item">
                    <div class="ball b-blue"></div><span class="ball-name">Blue</span><span class="ball-score">5</span>
                </div>
                <div class="ball-item">
                    <div class="ball b-pink"></div><span class="ball-name">Pink</span><span class="ball-score">6</span>
                </div>
                <div class="ball-item">
                    <div class="ball b-black"></div><span class="ball-name">Black</span><span
                        class="ball-score">7</span>
                </div>
            </div>
            <button class="rules-btn" style="border-color: #fff; color: #fff;"
                onclick="showPositionImage('century_position.jpeg')">Show Position 🎱</button>
        </div>
    </div>

    <div id="records-overlay" class="overlay-screen">
        <button class="close-cross" onclick="closeRecords()">✕</button>
        <h1 style="color: #3498db; margin-bottom: 20px; text-transform: uppercase;">Match History</h1>
        <div id="records-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        </div>
        <button class="action-btn" style="background:#e74c3c; color:white; margin-top:20px;"
            onclick="clearAllRecords()">🗑️ Clear All History</button>
    </div>

    <div id="image-overlay" class="overlay-screen">
        <button class="close-cross" onclick="closePositionImage()">✕</button>
        <img id="position-img" src="" alt="Snooker Position Layout">
    </div>

    <script>
        const colorClasses = ['color-0', 'color-1', 'color-2', 'color-3', 'color-4', 'color-5', 'color-6', 'color-7', 'color-8', 'color-9'];
        let boxData = JSON.parse(localStorage.getItem('mySiteData')) || [
            { val: 0, text: 'Player 1' },
            { val: 0, text: 'Player 2' }
        ];

        function renderBoxes() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            boxData.forEach((data, index) => {
                const boxDiv = document.createElement('div');
                boxDiv.className = `box ${colorClasses[index]}`;
                let removeBtnHtml = (boxData.length > 2 && index === boxData.length - 1) ? `<button class="remove-btn" onclick="removeLastPlayer()">-</button>` : '';
                boxDiv.innerHTML = `${removeBtnHtml}<div class="counter"><button class="btn" onclick="changeVal(${index}, -1)">-</button><div class="number">${data.val}</div><button class="btn" onclick="changeVal(${index}, 1)">+</button></div><input type="text" class="player-input" placeholder="Name..." value="${data.text}" oninput="updateText(${index}, this.value)">`;
                container.appendChild(boxDiv);
            });
            if (boxData.length < 10) {
                const addBox = document.createElement('div');
                addBox.className = 'box add-box';
                addBox.innerHTML = `<span style="font-size: 50px;">+</span><b style="font-size: 16px;">ADD PLAYER</b>`;
                addBox.onclick = addPlayer;
                container.appendChild(addBox);
            }
        }

        function addPlayer() { if (boxData.length < 10) { boxData.push({ val: 0, text: 'Player ' + (boxData.length + 1) }); saveData(); renderBoxes(); } }
        function removeLastPlayer() { if (boxData.length > 2) { boxData.pop(); saveData(); renderBoxes(); } }
        function changeVal(index, amount) { let newVal = boxData[index].val + amount; if (newVal >= -200 && newVal <= 200) { boxData[index].val = newVal; saveData(); renderBoxes(); } }
        function updateText(index, value) { boxData[index].text = value; saveData(); }
        function saveData() { localStorage.setItem('mySiteData', JSON.stringify(boxData)); }

        function showWinner() {
            const sortedPlayers = [...boxData].map((p, i) => ({ ...p, originalIndex: i })).sort((a, b) => b.val - a.val);
            const highestScore = sortedPlayers[0].val;
            const toppers = sortedPlayers.filter(p => p.val === highestScore);

            const overlay = document.getElementById('winner-overlay');
            const winnerCard = document.getElementById('winner-info');
            const statusText = document.getElementById('match-status');
            const saveBtn = document.getElementById('save-btn');

            saveBtn.innerHTML = '💾 SAVE';
            saveBtn.disabled = false;
            saveBtn.style.background = '#2ecc71';

            if (toppers.length > 1) {
                statusText.innerText = "MATCH TIED! 🤝 ";
                const names = toppers.map(p => p.text || 'N/A').join(" & ");
                winnerCard.innerHTML = `<div style="font-size: 20px; font-weight: bold;">TIED BETWEEN 👬</div><div style="font-size: 24px; font-style: italic; font-weight: 900; margin: 10px 0; color: #d35400;">${names}</div><div style="font-size: 22px; font-weight: 900;">SCORE: ${highestScore}</div>`;
            } else {
                statusText.innerText = "MATCH OVER!";
                winnerCard.innerHTML = `<div style="font-size: 24px; font-weight: bold;">Winner 🥇</div><div style="font-size: 34px; font-style: italic; font-weight: 900; margin: 10px 0;">${toppers[0].text || 'N/A'}</div><div style="font-size: 16px; font-weight: 900;">SCORE: ${highestScore}</div>`;
            }

            const listDiv = document.getElementById('all-scores');
            listDiv.innerHTML = '<h3 style="text-align:center; margin-bottom:15px; margin-top:30px;">LEADERBOARD</h3>';
            sortedPlayers.forEach((p) => {
                listDiv.innerHTML += `<div class="score-item ${colorClasses[p.originalIndex]}"><span>${p.text || 'Player'}</span><span>${p.val}</span></div>`;
            });

            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        function closeWinner() { document.getElementById('winner-overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }

        function getFormattedDateTime() {
            const now = new Date();
            const dd = String(now.getDate()).padStart(2, '0');
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const yyyy = now.getFullYear();

            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'pm' : 'am';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;

            return `${dd}-${mm}-${yyyy} ${hours}:${minutes}${ampm}`;
        }

        function saveMatchData() {
            const sortedPlayers = [...boxData].sort((a, b) => b.val - a.val);
            const highestScore = sortedPlayers[0].val;
            const toppers = sortedPlayers.filter(p => p.val === highestScore);

            let statusText = "";
            if (toppers.length > 1) {
                const names = toppers.map(p => p.text || 'Player').join(" and ");
                statusText = `Tied Between ${names}`;
            } else {
                statusText = `Winner ${toppers[0].text || 'Player'}`;
            }

            const matchRecord = {
                date: getFormattedDateTime(),
                status: statusText,
                players: sortedPlayers.map(p => ({ name: p.text || 'Player', score: p.val }))
            };

            let records = JSON.parse(localStorage.getItem('snookerMatchRecords')) || [];
            records.unshift(matchRecord);
            localStorage.setItem('snookerMatchRecords', JSON.stringify(records));

            const saveBtn = document.getElementById('save-btn');
            saveBtn.innerHTML = '✔ SAVED!';
            saveBtn.style.background = '#27ae60';
            saveBtn.disabled = true;
        }

        function showRecords() {
            let records = JSON.parse(localStorage.getItem('snookerMatchRecords')) || [];
            const container = document.getElementById('records-container');
            container.innerHTML = '';

            if (records.length === 0) {
                container.innerHTML = '<p style="color: rgba(255,255,255,0.6); font-style: italic;">No matches saved yet.</p>';
            } else {
                records.forEach((rec, index) => {
                    let playersHtml = rec.players.map(p =>
                        `<div class="hist-player"><span>${p.name}</span><span>${p.score}</span></div>`
                    ).join('');

                    container.innerHTML += `
                        <div class="history-card">
                            <button class="delete-single-btn" onclick="deleteSingleRecord(${index})">✕</button>
                            <div class="hist-date">🕒 ${rec.date}</div>
                            <div class="hist-status">${rec.status}</div>
                            ${playersHtml}
                        </div>
                    `;
                });
            }

            document.getElementById('records-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function deleteSingleRecord(index) {
            if (confirm("Are you sure you want to delete this record?")) {
                let records = JSON.parse(localStorage.getItem('snookerMatchRecords')) || [];
                records.splice(index, 1);
                localStorage.setItem('snookerMatchRecords', JSON.stringify(records));
                showRecords();
            }
        }

        function closeRecords() {
            document.getElementById('records-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function clearAllRecords() {
            if (confirm("Are you sure you want to delete ALL match history?")) {
                localStorage.removeItem('snookerMatchRecords');
                showRecords();
            }
        }

        function showRules() { document.getElementById('rules-overlay').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeRules() { document.getElementById('rules-overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }

        function showPositionImage(imgSrc) {
            document.getElementById('position-img').src = imgSrc;
            document.getElementById('image-overlay').style.display = 'flex';
        }
        function closePositionImage() { document.getElementById('image-overlay').style.display = 'none'; }

        function resetAll() { if (confirm("Reset everything?")) { boxData = [{ val: 0, text: 'Player 1' }, { val: 0, text: 'Player 2' }]; saveData(); renderBoxes(); } }
        window.onload = renderBoxes;
    </script>
</body>

</html>
