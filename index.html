<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snooker Scoreboard</title>
    <link rel="shortcut icon" href="8_ball.png">
    <style>
        /* Disable text selection and copy across the whole site */
        * {
            -webkit-user-select: none; /* Safari */
            -ms-user-select: none; /* IE 10 and older */
            user-select: none; /* Standard syntax */
            -webkit-touch-callout: none; /* Disable iOS long press menu */
        }

        /* Allow typing in input fields only */
        input {
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            background-color: #1a1a2e; color: white;
            padding: 10px; margin: 0; min-height: 100vh;
            overscroll-behavior-y: contain;
        }
        
        #grid-container {
            display: grid; grid-template-columns: 1fr; gap: 20px; 
            width: 100%; max-width: 600px; margin-bottom: 25px; padding: 10px; box-sizing: border-box;
        }

        .box {
            padding: 30px 15px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center;
            position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            min-height: 160px; justify-content: center;
            touch-action: none; 
        }

        .add-box {
            background: rgba(255, 255, 255, 0.05); border: 3px dashed rgba(255, 255, 255, 0.2);
            cursor: pointer; color: rgba(255, 255, 255, 0.4); min-height: 100px; touch-action: auto !important;
        }

        .remove-btn {
            position: absolute; top: 15px; right: 15px; background: #ff4757; color: white;
            border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer;
            font-weight: bold; font-size: 20px; display: flex; align-items: center; justify-content: center; z-index: 10;
        }

        /* Player Colors */
        .color-0 { background: #1e3799; color: white; }
        .color-1 { background: #82ccdd; color: #0a3d62; }
        .color-2 { background: #4b134f; color: white; }
        .color-3 { background: #f8a5c2; color: #4b134f; }
        .color-4 { background: #079992; color: white; }
        .color-5 { background: #b8e994; color: #079992; }
        .color-6 { background: #e58e26; color: white; }
        .color-7 { background: #feca57; color: #e58e26; }
        .color-8 { background: #b71540; color: white; }
        .color-9 { background: #ffcccc; color: #b71540; }

        .counter { display: flex; align-items: center; margin-bottom: 12px; }
        .btn {
            font-size: 30px; width: 55px; height: 55px; border: none; border-radius: 50%; 
            cursor: pointer; background: rgba(255, 255, 255, 0.2); color: inherit; font-weight: bold;
            touch-action: manipulation;
        }
        
        /* Number background matched to profile */
        .number { 
            font-size: 70px; font-weight: 900; min-width: 130px; text-align: center; 
            margin: 0 10px; cursor: ns-resize; touch-action: none; 
            background: transparent; /* Changed from rgba to transparent */
            border-radius: 10px;
        }
        
        .player-input {
            width: 80%; background: transparent; border: none; font-size: 24px; font-weight: bold; 
            text-align: center; color: inherit; outline: none; border-bottom: 2px solid rgba(255,255,255,0.2); padding: 5px;
        }

        .controls { display: flex; gap: 15px; margin: 20px 0; width: 100%; justify-content: center; }
        .action-btn {
            padding: 15px 35px; font-size: 18px; font-weight: bold; border: none; border-radius: 50px; 
            cursor: pointer; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.2s;
        }
        .complete-btn { background: #f1c40f; color: black; }
        .reset-btn { background: #e74c3c; }

        .top-btns { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
        .rules-btn {
            background: transparent; border: 1px solid #ffd700; color: #ffd700; padding: 5px 15px; 
            border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; text-transform: uppercase;
        }

        .overlay-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 46, 0.98); flex-direction: column; align-items: center; 
            z-index: 2000; padding: 20px 10px; overflow-y: auto; box-sizing: border-box;
        }
        
        .close-cross {
            position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); 
            color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px;
        }

        .footer { margin-top: auto; padding: 20px; font-size: 14px; color: rgba(255, 255, 255, 0.6); text-align: center; width: 100%; }
        .footer a { color: #ffd700; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;"> <h2 style="margin: 20px 0 10px 0; color: #ffd700; letter-spacing: 2px; text-transform: uppercase;">Snooker Scoreboard</h2>
    
    <div class="top-btns">
        <button class="rules-btn" onclick="showRules()">Color Rules 📋</button>
        <button class="rules-btn" style="border-color: #3498db; color: #3498db;" onclick="showRecords()">Show Record 📊</button>
    </div>

    <div id="grid-container"></div>

    <div class="controls">
        <button class="action-btn complete-btn" onclick="showWinner()">🏆 SHOW WINNER</button>
        <button class="action-btn reset-btn" onclick="resetAll()">RESET</button>
    </div>

    <div class="footer">
        Developed and design by <a href="https://www.hamaadsblog.in/About" target="_blank">Hamaad Afraan</a>
    </div>

    <div id="winner-overlay" class="overlay-screen">
        <h2 id="match-status" style="color: #ffd700;">FINAL STANDINGS</h2>
        <div id="winner-info" style="background: #ffd700; color: #000; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center;"></div>
        <div id="all-scores" style="width: 95%; max-width: 500px; margin-top: 20px;"></div>
        <div style="display: flex; gap: 15px; margin: 30px 0; width: 90%; max-width: 450px;">
            <button class="action-btn" id="save-btn" style="background:#2ecc71; flex:1;" onclick="saveMatchData()">💾 SAVE</button>
            <button class="action-btn" style="background:white; color:black; flex:1;" onclick="closeWinner()">CLOSE</button>
        </div>
    </div>

    <script>
        const colorClasses = ['color-0', 'color-1', 'color-2', 'color-3', 'color-4', 'color-5', 'color-6', 'color-7', 'color-8', 'color-9'];
        let boxData = JSON.parse(localStorage.getItem('mySiteData')) || [{ val: 0, text: 'Player 1' }, { val: 0, text: 'Player 2' }];
        let touchStartY = 0; let touchEndY = 0;

        // Extra layer to disable long-press copy on mobile
        window.oncontextmenu = function(event) {
            event.preventDefault();
            event.stopPropagation();
            return false;
        };

        function renderBoxes() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            boxData.forEach((data, index) => {
                const boxDiv = document.createElement('div');
                boxDiv.className = `box ${colorClasses[index]}`;

                let removeBtnHtml = (boxData.length > 2 && index === boxData.length - 1) ? `<button class="remove-btn" onclick="removeLastPlayer(event)">-</button>` : '';
                
                boxDiv.innerHTML = `
                    ${removeBtnHtml}
                    <div class="counter">
                        <button class="btn" onclick="changeVal(${index}, -1)">-</button>
                        <div class="number" id="num-${index}">${data.val}</div>
                        <button class="btn" onclick="changeVal(${index}, 1)">+</button>
                    </div>
                    <input type="text" class="player-input" value="${data.text}" oninput="updateText(${index}, this.value)">
                `;

                const scoreDisplay = boxDiv.querySelector('.number');
                
                scoreDisplay.addEventListener('touchstart', (e) => {
                    touchStartY = e.touches[0].clientY;
                }, {passive: true});

                scoreDisplay.addEventListener('touchend', (e) => {
                    touchEndY = e.changedTouches[0].clientY;
                    handleSwipe(index);
                }, {passive: true});

                container.appendChild(boxDiv);
            });

            if (boxData.length < 10) {
                const addBox = document.createElement('div');
                addBox.className = 'box add-box';
                addBox.innerHTML = `<span style="font-size: 50px;">+</span><b>ADD PLAYER</b>`;
                addBox.onclick = addPlayer;
                container.appendChild(addBox);
            }
        }

        function handleSwipe(index) {
            const distance = touchStartY - touchEndY;
            if (Math.abs(distance) < 30) return; 
            if (distance > 0) changeVal(index, 1); 
            else changeVal(index, -1);
        }

        function changeVal(index, amount) { 
            boxData[index].val += amount; 
            saveData();
            document.getElementById(`num-${index}`).innerText = boxData[index].val;
        }

        function addPlayer() { if (boxData.length < 10) { boxData.push({ val: 0, text: 'Player ' + (boxData.length + 1) }); saveData(); renderBoxes(); } }
        function removeLastPlayer(e) { e.stopPropagation(); boxData.pop(); saveData(); renderBoxes(); }
        function updateText(index, value) { boxData[index].text = value; saveData(); }
        function saveData() { localStorage.setItem('mySiteData', JSON.stringify(boxData)); }
        function resetAll() { if (confirm("Reset everything?")) { boxData = [{ val: 0, text: 'Player 1' }, { val: 0, text: 'Player 2' }]; saveData(); renderBoxes(); } }
        
        function showWinner() {
            const sorted = [...boxData].sort((a, b) => b.val - a.val);
            document.getElementById('winner-info').innerHTML = `<h2>Winner: ${sorted[0].text}</h2><h3>Score: ${sorted[0].val}</h3>`;
            document.getElementById('winner-overlay').style.display = 'flex';
        }
        function closeWinner() { document.getElementById('winner-overlay').style.display = 'none'; }
        
        function showRules() { alert("Rules: Red=1, Yellow=2, Green=3, Brown=4, Blue=5, Pink=6, Black=7"); }
        function showRecords() { alert("Match history feature is active."); }

        window.onload = renderBoxes;
    </script>
</body>
</html>
